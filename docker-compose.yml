# docker-compose.yml — Production
# Jalankan: docker-compose up -d
#
# Keamanan:
#   - DEBUG=False
#   - Port DB tidak di-expose ke luar
#   - Secret dari .env file
#   - Gunicorn (bukan dev server)
#   - restart: unless-stopped

services:

  django:
    container_name: simple_lms
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             rm -f jwt-signing.pem jwt-signing.pub &&
             python manage.py make_rsa &&
             python -m gunicorn simplelms.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 60
               --access-logfile -
               --error-logfile -"
    volumes:
      - ./code:/code
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Batasi resource container
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    container_name: simple_db
    image: postgres:16
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    # TIDAK expose port DB ke luar — hanya bisa diakses dari container Django
    # ports:
    #   - "5432:5432"   <-- dinonaktifkan di production
    volumes:
      - ./postgres-data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
